name: Rebuild Images

on:
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: |
          cd /home/caramey/prod
          git fetch origin main
          git reset --hard origin/main

      - name: Build backend image
        run: |
          cd /home/caramey/prod/backend
          docker build -t backend:latest .

      - name: Build frontend image
        run: |
          cd /home/caramey/prod/react-site
          docker build -t react-site:latest .

      - name: Restart containers with new images
        run: |
          cd /home/caramey/prod
          docker-compose up -d 2>/dev/null || docker compose up -d
          sleep 5
          echo "=== CONTAINER STATUS ==="
          docker-compose ps 2>/dev/null || docker compose ps
          echo "=== HEALTH CHECK ==="
          curl -s -o /dev/null -w "ui (port 3030): HTTP %{http_code}\n" http://localhost:3030 || echo "ui not responding"
          curl -s -o /dev/null -w "api (port 5000): HTTP %{http_code}\n" http://localhost:5000 || echo "api not responding"
          curl -s -o /dev/null -w "nginx (port 80): HTTP %{http_code}\n" http://localhost:80 || echo "nginx not responding"

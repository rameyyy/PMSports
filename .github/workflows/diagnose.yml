name: Server Diagnostics

on:
  workflow_dispatch:

jobs:
  diagnose:
    runs-on: self-hosted
    steps:
      - name: System info
        run: |
          echo "=== HOSTNAME ==="
          hostname
          echo "=== UPTIME ==="
          uptime
          echo "=== DISK USAGE ==="
          df -h
          echo "=== MEMORY ==="
          free -h
          echo "=== TOP PROCESSES (CPU) ==="
          ps aux --sort=-%cpu | head -20

      - name: Docker status
        run: |
          echo "=== DOCKER SERVICE ==="
          systemctl is-active docker || echo "docker service not active"
          echo "=== RUNNING CONTAINERS ==="
          docker ps -a
          echo "=== DOCKER COMPOSE (prod) ==="
          cd /home/caramey/prod && docker compose ps 2>/dev/null || docker-compose ps 2>/dev/null || echo "no compose project found"
          echo "=== RECENT CONTAINER LOGS (last 30 lines each) ==="
          for c in $(docker ps -a --format '{{.Names}}'); do
            echo "--- $c ---"
            docker logs --tail 30 "$c" 2>&1
          done

      - name: Cloudflared status
        run: |
          echo "=== CLOUDFLARED PROCESS ==="
          pgrep -a cloudflared || echo "cloudflared not running"
          echo "=== CLOUDFLARED SERVICE ==="
          systemctl is-active cloudflared 2>/dev/null || echo "no systemd service"
          systemctl status cloudflared 2>/dev/null || true
          echo "=== CLOUDFLARED AS DOCKER ==="
          docker ps -a --filter "name=cloudflare" --format "{{.Names}} {{.Status}}" || true

      - name: Networking
        run: |
          echo "=== LISTENING PORTS ==="
          ss -tlnp
          echo "=== DNS RESOLUTION ==="
          nslookup algopicks.net || echo "dns lookup failed"
          echo "=== CURL LOCALHOST ==="
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost 2>/dev/null || echo "localhost not responding"
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:80 2>/dev/null || echo "port 80 not responding"
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:443 2>/dev/null || echo "port 443 not responding"
          curl -s -o /dev/null -w "HTTP %{http_code}" http://localhost:8080 2>/dev/null || echo "port 8080 not responding"

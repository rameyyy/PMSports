name: Restart Cloudflared Tunnel

on:
  workflow_dispatch:

jobs:
  restart-cloudflared:
    runs-on: self-hosted
    steps:
      - name: Check and start SSH service
        run: |
          echo "=== SSH SERVICE STATUS ==="
          systemctl is-active sshd 2>/dev/null || systemctl is-active ssh 2>/dev/null || echo "SSH service not active"

          echo "=== STARTING SSH ==="
          systemctl start sshd 2>/dev/null || systemctl start ssh 2>/dev/null || echo "Could not start SSH service (may need sudo)"

          echo "=== SSH LISTENING? ==="
          ss -tlnp | grep -E ':22\s' || echo "Nothing listening on port 22"

      - name: Check cloudflared tunnel config
        run: |
          echo "=== CLOUDFLARED DOCKER LOGS (last 50 lines) ==="
          docker logs --tail 50 cloudflared 2>&1

          echo ""
          echo "=== CLOUDFLARED CONFIG ==="
          cat /etc/cloudflared/config.yml 2>/dev/null || cat /home/caramey/.cloudflared/config.yml 2>/dev/null || echo "No config.yml found"

          echo ""
          echo "=== TESTING LOCAL SSH CONNECTIVITY ==="
          curl -s -o /dev/null -w "SSH port 22: %{http_code}\n" http://localhost:22 2>/dev/null; true
          nc -zv localhost 22 2>&1 || echo "Cannot connect to localhost:22"

      - name: Restart cloudflared container
        run: |
          echo "=== RESTARTING CLOUDFLARED ==="
          docker restart cloudflared
          docker update --restart unless-stopped cloudflared
          sleep 3
          echo "=== FINAL STATUS ==="
          docker ps --filter "name=cloudflare" --format "{{.Names}} {{.Status}}"
          pgrep -a cloudflared || echo "cloudflared process not found"
          echo "=== SSH CHECK ==="
          ss -tlnp | grep -E ':22\s' || echo "Nothing listening on port 22"
